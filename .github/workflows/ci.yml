name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Linting with Ruff
  # Checks code style, import ordering, and common Python anti-patterns.
  # Covers wallet/, tests/, and blockchain/ (Phase 3 onwards).
  # -----------------------------------------------------------------------
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint check
        run: ruff check wallet/ tests/ blockchain/

      - name: Ruff format check
        run: ruff format --check wallet/ tests/ blockchain/

  # -----------------------------------------------------------------------
  # Job 2: Security scan with Bandit
  # Scans Python source code for common security vulnerabilities.
  # -ll = report only medium and high severity issues.
  # Covers wallet/ and blockchain/ (Phase 3 onwards).
  # -----------------------------------------------------------------------
  security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Bandit
        run: bandit -r wallet/ blockchain/ -ll -f json -o bandit-report.json || true

      - name: Display Bandit results
        run: |
          if [ -f bandit-report.json ]; then
            python -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = data.get('results', [])
          if issues:
              print(f'Found {len(issues)} issue(s):')
              for i in issues:
                  print(f\"  [{i['issue_severity']}] {i['issue_text']} at {i['filename']}:{i['line_number']}\")
              sys.exit(1)
          else:
              print('No security issues found.')
          "
          fi

  # -----------------------------------------------------------------------
  # Job 3: Dependency vulnerability check with pip-audit
  # Audits ONLY runtime dependencies (requirements.txt).
  # Dev tools (bandit, ruff, pytest, pip-audit) are in requirements-dev.txt
  # and are intentionally excluded — this cleanly removes the pygments
  # CVE-2026-4539 false positive that appeared when bandit was in
  # requirements.txt and pulled pygments as a transitive dependency.
  # -----------------------------------------------------------------------
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on production requirements
        run: pip-audit -r requirements.txt

  # -----------------------------------------------------------------------
  # Job 4: Compile Solidity contracts with Hardhat
  # Validates that TransactionContract.sol compiles cleanly.
  # Does NOT deploy — no network required.
  # -----------------------------------------------------------------------
  contracts-compile:
    name: Hardhat Compile Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm install

      - name: Compile Solidity contracts
        run: npx hardhat compile

  # -----------------------------------------------------------------------
  # Job 5: Tests with coverage
  # Runs the full pytest suite with coverage measurement.
  # Fails if coverage drops below 80%.
  # Uploads the coverage report as a build artifact for review.
  # Depends on lint, security, dependency-check (contracts-compile runs
  # in parallel — it has no Python dependencies).
  # -----------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint, security, dependency-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create .env for tests
        run: |
          echo "WALLET_ENCRYPTION_PASSPHRASE=ci-test-passphrase-only" > .env
          echo "DATASET_PATH=datasets/Eth_Txs.csv" >> .env
          echo "KEYSTORE_PATH=keystore" >> .env
          echo "LOG_LEVEL=WARNING" >> .env

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --cov=wallet \
            --cov=blockchain \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
