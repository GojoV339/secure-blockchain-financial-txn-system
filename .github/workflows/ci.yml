name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Linting with Ruff
  # Checks code style, import ordering, and common Python anti-patterns.
  # Runs both 'check' (lint rules) and 'format --check' (formatting).
  # -----------------------------------------------------------------------
  lint:
    name: Ruff Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint check
        run: ruff check wallet/ tests/

      - name: Ruff format check
        run: ruff format --check wallet/ tests/

  # -----------------------------------------------------------------------
  # Job 2: Security scan with Bandit
  # Scans Python source code for common security vulnerabilities like
  # hardcoded passwords, insecure deserialization, SQL injection patterns,
  # use of assert in production code, etc.
  # -ll = report only medium and high severity issues
  # -----------------------------------------------------------------------
  security:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r wallet/ -ll -f json -o bandit-report.json || true

      - name: Display Bandit results
        run: |
          if [ -f bandit-report.json ]; then
            python -c "
          import json, sys
          with open('bandit-report.json') as f:
              data = json.load(f)
          issues = data.get('results', [])
          if issues:
              print(f'Found {len(issues)} issue(s):')
              for i in issues:
                  print(f\"  [{i['issue_severity']}] {i['issue_text']} at {i['filename']}:{i['line_number']}\")
              sys.exit(1)
          else:
              print('No security issues found.')
          "
          fi

  # -----------------------------------------------------------------------
  # Job 3: Dependency vulnerability check with pip-audit
  # Checks installed dependencies against known CVE databases.
  # Uses --requirement flag to audit requirements.txt directly so it
  # doesn't scan unrelated system packages.
  # -----------------------------------------------------------------------
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit on requirements
        run: pip-audit -r requirements.txt

  # -----------------------------------------------------------------------
  # Job 4: Tests with coverage
  # Runs the full pytest suite with coverage measurement.
  # Fails if coverage drops below 80%.
  # Uploads the coverage report as a build artifact for review.
  # -----------------------------------------------------------------------
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: [lint, security, dependency-check]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env for tests
        run: |
          echo "WALLET_ENCRYPTION_PASSPHRASE=ci-test-passphrase-only" > .env
          echo "DATASET_PATH=datasets/Eth_Txs.csv" >> .env
          echo "KEYSTORE_PATH=keystore" >> .env
          echo "LOG_LEVEL=WARNING" >> .env

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            -v \
            --cov=wallet \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
