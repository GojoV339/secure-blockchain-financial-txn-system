<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blockchain Project — Architecture Graph</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --bg:#0a0e17;
    --surface:#111827;
    --surface2:#1e293b;
    --border:#1e293b;
    --text:#e2e8f0;
    --text2:#94a3b8;
    --accent:#6366f1;
    --accent2:#818cf8;
    --green:#34d399;
    --amber:#fbbf24;
    --rose:#fb7185;
    --cyan:#22d3ee;
    --purple:#c084fc;
    --orange:#fb923c;
  }

  html,body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    overflow:hidden;
  }

  /* ── Canvas ─────────────────────────────────────────────────── */
  canvas{display:block}

  /* ── Header ─────────────────────────────────────────────────── */
  #header{
    position:fixed;top:0;left:0;right:0;
    display:flex;align-items:center;gap:16px;
    padding:12px 24px;
    background:linear-gradient(180deg,rgba(10,14,23,.98),rgba(10,14,23,.85));
    backdrop-filter:blur(24px);
    border-bottom:1px solid rgba(99,102,241,.15);
    z-index:100;
  }
  #header h1{
    font-size:16px;font-weight:700;letter-spacing:-.3px;
    background:linear-gradient(135deg,var(--accent2),var(--cyan));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  #header .pill{
    font-size:11px;font-weight:600;
    padding:3px 10px;border-radius:99px;
    background:rgba(99,102,241,.15);color:var(--accent2);
  }
  #header .spacer{flex:1}
  .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .legend-item{
    display:flex;align-items:center;gap:5px;
    font-size:11px;color:var(--text2);
  }
  .legend-dot{
    width:10px;height:10px;border-radius:50%;
  }

  /* ── Sidebar ────────────────────────────────────────────────── */
  #sidebar{
    position:fixed;top:52px;right:0;bottom:0;width:380px;
    background:linear-gradient(180deg,var(--surface),rgba(17,24,39,.96));
    backdrop-filter:blur(20px);
    border-left:1px solid var(--border);
    padding:20px;
    overflow-y:auto;
    transform:translateX(100%);
    transition:transform .35s cubic-bezier(.4,0,.2,1);
    z-index:90;
  }
  #sidebar.open{transform:translateX(0)}
  #sidebar h2{
    font-size:14px;font-weight:700;margin-bottom:6px;
    color:var(--accent2);
  }
  #sidebar .file-path{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--text2);margin-bottom:14px;
    word-break:break-all;
  }
  #sidebar .section{margin-bottom:16px}
  #sidebar .section-title{
    font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:1px;color:var(--text2);margin-bottom:6px;
  }
  #sidebar .badge{
    display:inline-block;font-size:10px;font-weight:600;
    padding:2px 8px;border-radius:4px;margin:2px 4px 2px 0;
  }
  #sidebar .desc{
    font-size:12px;line-height:1.6;color:var(--text2);
  }
  #sidebar .fn-item{
    padding:6px 10px;border-radius:6px;margin-bottom:4px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.04);
    font-family:'JetBrains Mono',monospace;font-size:11px;
    color:var(--green);
  }
  #sidebar .fn-item .fn-desc{
    font-family:'Inter',sans-serif;font-size:10px;color:var(--text2);margin-top:2px;display:block;
  }
  #sidebar .close-btn{
    position:absolute;top:14px;right:14px;
    width:28px;height:28px;border-radius:6px;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
    color:var(--text2);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;transition:all .2s;
  }
  #sidebar .close-btn:hover{background:rgba(251,113,133,.15);color:var(--rose)}

  /* ── Tooltip ────────────────────────────────────────────────── */
  #tooltip{
    position:fixed;
    padding:6px 12px;border-radius:6px;
    background:var(--surface2);
    border:1px solid rgba(99,102,241,.2);
    font-size:11px;color:var(--text);
    pointer-events:none;opacity:0;
    transition:opacity .15s;z-index:200;
    max-width:280px;
  }

  /* ── Controls ───────────────────────────────────────────────── */
  #controls{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    display:flex;gap:8px;z-index:100;
  }
  #controls button{
    padding:6px 16px;border-radius:8px;
    background:var(--surface2);border:1px solid var(--border);
    color:var(--text);font-size:12px;font-weight:500;
    cursor:pointer;transition:all .2s;
    font-family:'Inter',sans-serif;
  }
  #controls button:hover{
    background:rgba(99,102,241,.2);border-color:var(--accent);
  }
  #controls button.active{
    background:rgba(99,102,241,.25);border-color:var(--accent2);color:var(--accent2);
  }

  /* Scrollbar */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>⛓ Blockchain Project Graph</h1>
  <span class="pill">v0.3.0</span>
  <div class="spacer"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Package</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Module</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>Test</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--cyan)"></div>Config / Infra</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div>Data</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>Class</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>External</div>
  </div>
</div>

<!-- Sidebar detail panel -->
<div id="sidebar">
  <button class="close-btn" onclick="closeSidebar()">✕</button>
  <div id="sidebar-content"></div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Controls -->
<div id="controls">
  <button onclick="resetView()">Reset View</button>
  <button onclick="toggleLabels()" id="btnLabels" class="active">Labels</button>
  <button onclick="toggleEdges()" id="btnEdges" class="active">Edges</button>
  <button onclick="filterLayer('all')" class="active" data-layer="all">All</button>
  <button onclick="filterLayer('wallet')" data-layer="wallet">Wallet</button>
  <button onclick="filterLayer('blockchain')" data-layer="blockchain">Blockchain</button>
  <button onclick="filterLayer('tests')" data-layer="tests">Tests</button>
  <button onclick="filterLayer('infra')" data-layer="infra">Infra</button>
</div>

<canvas id="canvas"></canvas>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════════

const NODES = [
  // ── Packages / Root ──
  {id:'root', label:'block-chain-project', group:'package', layer:'all',

   file:'pyproject.toml', r:42,

  {id:'wallet_pkg', label:'wallet/', group:'package', layer:'wallet',

  {id:'blockchain_pkg', label:'blockchain/', group:'package', layer:'blockchain',
   desc:'Blockchain Interaction Module — Phase 3. Python interface to Ethereum smart contracts.',
   file:'blockchain/__init__.py', r:32},

  // ── Wallet modules ──
  {id:'config', label:'config.py', group:'config', layer:'wallet',
   desc:'Env-based configuration. Single source of truth for paths, encryption settings, and logging.',
   file:'wallet/config.py', r:24,

   ]},

  {id:'address_loader', label:'address_loader.py', group:'module', layer:'wallet',

   desc:'ECDSA key pair management. Handles generation, AES-256 encrypted persistence.',
   file:'wallet/key_manager.py', r:28,
   fns:[
     {name:'generate_key_pair()', desc:'New ECDSA secp256k1 keypair'},
     {name:'save_keys(addr, priv, pub, pass)', desc:'Encrypted to disk (chmod 0o600)'},
   ]},

  {id:'signer', label:'signer.py', group:'module', layer:'wallet',
   desc:'ECDSA signing & verification with replay protection and malleability protection.',
   file:'wallet/signer.py', r:28,
   fns:[
     {name:'sign_transaction(tx, key, nonce)', desc:'ECDSA-SHA256, low-S normalised'},
     {name:'verify_signature(sig, pub, tx, nonce)', desc:'Rejects high-S'},

  // ── Blockchain modules (Phase 3) ──
  {id:'blockchain_contract', label:'contract.py', group:'module', layer:'blockchain',
   desc:'Python web3.py wrapper for TransactionContract. Clean API for funding, submitting, and approving transactions.',
   file:'blockchain/contract.py', r:30,
   fns:[
     {name:'from_deployment_file(w3)', desc:'Factory loading from deployment.json'},
     {name:'fund_wallet(wallet, amount, sender)', desc:'Credit on-chain ledger'},
     {name:'submit_transaction(s, r, v, f)', desc:'Submit for approval, reserves funds'},
     {name:'approve_transaction(tx_hash, owner)', desc:'Finalise on-chain'},
   ]},

  {id:'solidity_contract', label:'TransactionContract.sol', group:'module', layer:'blockchain',
   desc:'Full Solidity 0.8.20 contract. Internal balance ledger, transaction lifecycle, and events.',
   file:'contracts/TransactionContract.sol', r:34,
   exports:['fundWallet','submitTransaction','approveTransaction','rejectTransaction','balances']},

  {id:'hardhat_config', label:'hardhat.config.js', group:'config', layer:'blockchain',
   desc:'Hardhat configuration for development, Ganache (:7545), and localhost (:8545).',
   file:'hardhat.config.js', r:24},

  {id:'deploy_script', label:'deploy.js', group:'config', layer:'blockchain',
   desc:'Hardhat deployment script. Deploys to network and writes deployment.json for Python layer.',
   file:'scripts/deploy.js', r:22},

  // ── Tests ──
  {id:'test_addr', label:'test_address_loader.py', group:'test', layer:'tests',
   file:'tests/test_address_loader.py', r:22, desc:'11 tests for CSV loading and validation.'},
  {id:'test_keys', label:'test_key_manager.py', group:'test', layer:'tests',
   file:'tests/test_key_manager.py', r:22, desc:'14 tests for generation and encrypted storage.'},
  {id:'test_sign', label:'test_signer.py', group:'test', layer:'tests',
   file:'tests/test_signer.py', r:22, desc:'16 tests for signatures and malleability.'},
  {id:'test_contract', label:'test_contract.py', group:'test', layer:'tests',
   file:'tests/test_contract.py', r:24, desc:'35 mocked tests for contract interface (CI-safe).'},

  // ── Infra / Config ──
  {id:'ci', label:'CI Pipeline', group:'config', layer:'infra',
   desc:'GitHub Actions: Lint, Security, Dependency Audit, and Tests.',
   file:'.github/workflows/ci.yml', r:28},
  {id:'req_prod', label:'requirements.txt', group:'config', layer:'infra',
   desc:'Runtime dependencies only. No dev tools to avoid false positives in audit.',
   file:'requirements.txt', r:20},
  {id:'req_dev', label:'requirements-dev.txt', group:'config', layer:'infra',
   desc:'Development tools: pytest, ruff, bandit, pip-audit.',
   file:'requirements-dev.txt', r:20},
  {id:'package_json', label:'package.json', group:'config', layer:'infra',
   desc:'NPM package for Hardhat and ethers.js development.',
   file:'package.json', r:20},

  // ── Data ──
  {id:'dataset', label:'Eth_Txs.csv', group:'data', layer:'infra', r:22},
  {id:'fraud_csv', label:'Fraud Dataset', group:'data', layer:'infra', r:20},

  // ── External ──
  {id:'ext_web3', label:'web3.py', group:'external', layer:'all', r:18},
  {id:'ext_hardhat', label:'Hardhat', group:'external', layer:'all', r:18},
  {id:'ext_crypto', label:'cryptography', group:'external', layer:'all', r:18},

const EDGES = [
  // Containment
  {from:'root', to:'wallet_pkg', type:'contains'},
  {from:'root', to:'blockchain_pkg', type:'contains'},
  {from:'root', to:'hardhat_config', type:'contains'},
  {from:'root', to:'deploy_script', type:'contains'},
  {from:'root', to:'package_json', type:'contains'},
  {from:'root', to:'req_prod', type:'contains'},
  {from:'root', to:'req_dev', type:'contains'},
  {from:'root', to:'ci', type:'contains'},

  {from:'wallet_pkg', to:'config', type:'contains'},
  {from:'wallet_pkg', to:'address_loader', type:'contains'},
  {from:'wallet_pkg', to:'key_manager', type:'contains'},
  {from:'wallet_pkg', to:'signer', type:'contains'},

  {from:'blockchain_pkg', to:'blockchain_contract', type:'contains'},
  {from:'root', to:'solidity_contract', type:'contains'},

  // Logic flow
  {from:'blockchain_contract', to:'solidity_contract', type:'data', label:'Interface / ABI'},
  {from:'deploy_script', to:'solidity_contract', type:'imports', label:'Deploys'},
  {from:'deployment_info', to:'blockchain_contract', type:'data', label:'Address'},
  {from:'deploy_script', to:'root', type:'data', label:'Writes deployment.json'},

  // Imports
  {from:'address_loader', to:'config', type:'imports'},
  {from:'key_manager', to:'config', type:'imports'},
  {from:'blockchain_contract', to:'config', type:'imports'},
  {from:'blockchain_contract', to:'ext_web3', type:'external'},

  // Flow wallet -> blockchain
  {from:'signer', to:'blockchain_contract', type:'data', label:'Signed TX → Contract'},

  // Tests
  {from:'test_addr', to:'address_loader', type:'tests'},
  {from:'test_keys', to:'key_manager', type:'tests'},
  {from:'test_sign', to:'signer', type:'tests'},
  {from:'test_contract', to:'blockchain_contract', type:'tests'},

  // CI
  {from:'ci', to:'test_contract', type:'triggers', label:'Verify Phase 3'}
];

// ═══════════════════════════════════════════════════════════════
// COLORS & RENDER ENGINE (Consistent with v0.1.0)
// ═══════════════════════════════════════════════════════════════
const GROUP_COLORS = {
  package:'#6366f1', module:'#34d399', test:'#fbbf24',
  config:'#22d3ee', data:'#fb7185', 'class':'#c084fc', external:'#fb923c'
};
const EDGE_COLORS = {
  contains:'rgba(99,102,241,.12)',
  imports:'rgba(99,102,241,.35)',
  data:'rgba(34,211,238,.4)',
  tests:'rgba(251,191,36,.3)',
  external:'rgba(251,146,60,.2)',
  triggers:'rgba(251,191,36,.15)',
};

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let W, H, dpr;
function resize(){
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize', resize);

let showLabels = true, showEdges = true, activeLayer = 'all';
let camera = {x:0, y:0, zoom:1};
let drag = null, hover = null, selected = null;
let simRunning = true;

NODES.forEach((n,i) => {
  const angle = (i / NODES.length) * Math.PI * 2;
  const spread = 250 + Math.random() * 100;
  n.x = Math.cos(angle) * spread;
  n.y = Math.sin(angle) * spread;
  n.vx = 0; n.vy = 0;
  n.visible = true;
  n.alpha = 1;
});

function isVisible(n){
  if(activeLayer === 'all') return true;
  if(activeLayer === 'wallet') return n.layer==='wallet' || n.id==='root';
  if(activeLayer === 'blockchain') return n.layer==='blockchain' || n.id==='root';
  if(activeLayer === 'tests') return n.layer==='tests' || n.group==='package';
  if(activeLayer === 'infra') return n.layer==='infra' || n.id==='root';
  return true;
}

function simulate(){
  const alpha = .35, repulsion = 3200, spring = .005, damping = .82, idealLen = 150;
  const visNodes = NODES.filter(n => n.visible);

  for(let i=0;i<visNodes.length;i++){
    for(let j=i+1;j<visNodes.length;j++){
      let dx = visNodes[j].x - visNodes[i].x;
      let dy = visNodes[j].y - visNodes[i].y;
      let dist = Math.sqrt(dx*dx+dy*dy) || 1;
      let force = repulsion / (dist * dist);
      let fx = (dx/dist)*force;
      let fy = (dy/dist)*force;
      visNodes[i].vx -= fx; visNodes[i].vy -= fy;
      visNodes[j].vx += fx; visNodes[j].vy += fy;
    }
  }

  EDGES.forEach(e => {
    const a = NODES.find(n=>n.id===e.from);
    const b = NODES.find(n=>n.id===e.to);
    if(!a||!b||!a.visible||!b.visible) return;
    let dx = b.x - a.x, dy = b.y - a.y;
    let dist = Math.sqrt(dx*dx+dy*dy) || 1;
    let force = spring * (dist - idealLen);
    let fx = (dx/dist)*force;
    let fy = (dy/dist)*force;
    a.vx += fx; a.vy += fy;
    b.vx -= fx; b.vy -= fy;
  });

  visNodes.forEach(n => {
    n.vx -= n.x * .001;
    n.vy -= n.y * .001;
    if(drag && drag.node === n) return;
    n.vx *= damping; n.vy *= damping;
    n.x += n.vx * alpha;
    n.y += n.vy * alpha;
  });
}

function toScreen(x,y){
  return {x: (x - camera.x) * camera.zoom + W/2, y: (y - camera.y) * camera.zoom + H/2};
}
function toWorld(sx,sy){
  return {x: (sx - W/2) / camera.zoom + camera.x, y: (sy - H/2) / camera.zoom + camera.y};
}

function drawEdge(a,b,edge){
  const p1 = toScreen(a.x, a.y);
  const p2 = toScreen(b.x, b.y);
  const color = EDGE_COLORS[edge.type] || 'rgba(255,255,255,.1)';
  ctx.strokeStyle = color;
  ctx.lineWidth = edge.type === 'data' ? 2 : 1;

  const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
  const dx = p2.x-p1.x, dy = p2.y-p1.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const offset = dist * .08;
  const cx = mx - dy/dist * offset;
  const cy = my + dx/dist * offset;

  ctx.beginPath();
  ctx.moveTo(p1.x, p1.y);
  ctx.quadraticCurveTo(cx, cy, p2.x, p2.y);
  ctx.stroke();
}

function drawNode(n){
  const p = toScreen(n.x, n.y);
  const r = n.r * camera.zoom;
  const col = GROUP_COLORS[n.group] || '#6366f1';
  const isHover = hover === n;
  const isSel = selected === n;

  ctx.globalAlpha = n.alpha;
  if(isHover || isSel){
    ctx.shadowBlur = 15; ctx.shadowColor = col;
  }
  
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI*2);
  ctx.fillStyle = col + '20';
  ctx.fill();
  ctx.strokeStyle = isHover||isSel ? col : col+'80';
  ctx.lineWidth = isHover||isSel ? 3 : 1.5;
  ctx.stroke();
  
  ctx.beginPath();
  ctx.arc(p.x, p.y, r*.3, 0, Math.PI*2);
  ctx.fillStyle = col;
  ctx.fill();

  ctx.shadowBlur = 0;
  if(showLabels && camera.zoom > .4){
    ctx.font = `600 ${Math.max(10,12*camera.zoom)}px Inter`;
    ctx.fillStyle = '#f8fafc';
    ctx.textAlign = 'center';
    ctx.fillText(n.label, p.x, p.y + r + 16);
  }
  ctx.globalAlpha = 1;
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(showEdges){
    EDGES.forEach(e => {
      const a = NODES.find(n=>n.id===e.from);
      const b = NODES.find(n=>n.id===e.to);
      if(a && b && a.visible && b.visible) drawEdge(a,b,e);
    });
  }
  NODES.filter(n=>n.visible).forEach(drawNode);
}

function loop(){
  NODES.forEach(n => {
    const vis = isVisible(n);
    n.visible = vis || n.alpha > .01;
    n.alpha += (vis ? 1 : 0 - n.alpha) * .08;
  });
  if(simRunning) simulate();
  render();
  requestAnimationFrame(loop);
}
loop();

// UI HANDLERS
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); selected = null; }
function resetView(){ camera = {x:0, y:0, zoom:1}; }
function toggleLabels(){ showLabels = !showLabels; document.getElementById('btnLabels').classList.toggle('active'); }
function toggleEdges(){ showEdges = !showEdges; document.getElementById('btnEdges').classList.toggle('active'); }
function filterLayer(l){
  activeLayer = l;
  document.querySelectorAll('#controls button[data-layer]').forEach(b => b.classList.toggle('active', b.dataset.layer === l));
}

function openSidebar(node){
  const sb = document.getElementById('sidebar');
  const cont = document.getElementById('sidebar-content');
  let html = `<h2>${node.label}</h2><div class="file-path">${node.file||''}</div>`;
  html += `<div class="section"><div class="desc">${node.desc||''}</div></div>`;
  html += `<div class="section"><span class="badge" style="background:${GROUP_COLORS[node.group]}40;color:${GROUP_COLORS[node.group]}">${node.group}</span></div>`;
  if(node.fns){
    html += `<div class="section"><div class="section-title">Features</div>`;
    node.fns.forEach(f => html += `<div class="fn-item">${f.name}<span class="fn-desc">${f.desc}</span></div>`);
    html += `</div>`;
  }
  cont.innerHTML = html;
  sb.classList.add('open');
}

canvas.addEventListener('mousedown', e => {
  const w = toWorld(e.clientX, e.clientY);
  const h = NODES.find(n => n.visible && Math.sqrt((n.x-w.x)**2 + (n.y-w.y)**2) < n.r);
  if(h){
    drag = {node: h};
    openSidebar(h);
    selected = h;
  } else {
    drag = {pan:true, lastX:e.clientX, lastY:e.clientY};
  }
});
canvas.addEventListener('mousemove', e => {
  if(!drag) {
    const w = toWorld(e.clientX, e.clientY);
    hover = NODES.find(n => n.visible && Math.sqrt((n.x-w.x)**2 + (n.y-w.y)**2) < n.r);
    return;
  }
  if(drag.node){
    const w = toWorld(e.clientX, e.clientY);
    drag.node.x = w.x; drag.node.y = w.y;
  } else if(drag.pan){
    camera.x -= (e.clientX - drag.lastX) / camera.zoom;
    camera.y -= (e.clientY - drag.lastY) / camera.zoom;
    drag.lastX = e.clientX; drag.lastY = e.clientY;
  }
});
canvas.addEventListener('mouseup', () => drag = null);
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomIn = e.deltaY < 0;
  camera.zoom *= zoomIn ? 1.1 : 0.9;
}, {passive:false});

</script>
</body>
